<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //for(初始表達式; 布爾表達式; 疊代因子)
        //for ( ; ; ) -> ;一定要
        for(var i = 1; i<=100 ; i++){
            console.log(i);
        }

        var x = 10
        for(var i = 0 ; i<x ; i++){
            console.log(i);
        }

        //可以省略但一樣需要使用;  (基本不會省略)
        var j = 0
        for(; j<x ; j++){
            console.log(j);
        }



        //實際運用
        var sum = 0
        for(var i = 1; i<=9 ; i++){
            // console.log("i=" + i);
            document.write("<br/>");
            for (var j = 1 ; j<=i ; j++){
                sum = i * j
                console.log(i + "*" + j + "=" + sum); 
                document.write(i + "*" + j + "=" + sum + "　");
                // console.log("j=" + j);
            }
            
        }


    </script>
</body>
</html>
