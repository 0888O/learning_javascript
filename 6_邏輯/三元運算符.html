<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //if寫法
        var num = 11
        if(num % 2 === 0){
            console.log(num,"為偶數");
        }
        else{
            console.log(num,"為基數");
        }

        //三目運算符
        num % 2 === 0 ? console.log(num,"為偶數") : console.log(num,"為基數");
        
        var ans = num % 2 === 0 ? "偶數" : "基數";
        console.log(ans);
        
    </script>
</body>
</html>
