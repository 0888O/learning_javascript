<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // if else
        var a = 1;
        var b = 10;
        var c = "10";
        if(a < b){
            console.log("a小 b大");
        }

        if(b===c){
            console.log("b c數值及型態皆相同");
        }
        else if(b==c){
            console.log("b c數值相同");
        }
        else{
            console.log("b c完全不同");
        }


        //switch
        //每一個case模塊皆需要搭配break
        var day = 3;
        switch(day){
            case 1:
                console.log("今天星期一");
                break
            case 2:
                console.log("今天星期二");
                break
            case 3:
                console.log("今天星期三");
                break
            case 4:
                console.log("今天星期四");
                break
            case 5:
                console.log("今天星期五");
                break
            case 6:
                console.log("今天星期六");
                break
            default:
                console.log("今天星期日");
        }
        //若沒加break 會顯示三四五六日
    </script>
</body>
</html>
